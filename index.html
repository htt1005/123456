<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>浙江警官职业学院校园AI助手</title>
  <!-- Tailwind CSS v3 CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            campus: {
              50:  '#eff6ff',
              100: '#dbeafe',
              200: '#bfdbfe',
              500: '#3b82f6',
              600: '#2563eb',
              700: '#1d4ed8',
            }
          }
        }
      }
    }
  </script>
  <style>
    /* 自定义滚动条，保持简约风格 */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }

    /* 加载动画：三个跳动圆点 */
    .typing-dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #94a3b8;
      animation: typing-bounce 1.4s infinite ease-in-out both;
    }
    .typing-dot:nth-child(1) { animation-delay: -0.32s; }
    .typing-dot:nth-child(2) { animation-delay: -0.16s; }
    @keyframes typing-bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    /* 侧边栏移动端滑入 */
    .sidebar-overlay { transition: opacity 0.2s; }
    .sidebar-panel { transition: transform 0.25s ease; }

    /* 消息区域平滑滚动 */
    #chatContainer { scroll-behavior: smooth; }
  </style>
</head>
<body class="h-screen overflow-hidden bg-slate-50 text-slate-800 antialiased">

  <!-- ========== 移动端侧边栏遮罩 ========== -->
  <div id="sidebarOverlay"
       class="sidebar-overlay fixed inset-0 z-30 bg-black/30 opacity-0 pointer-events-none md:hidden"
       onclick="toggleSidebar(false)"></div>

  <div class="flex h-full">

    <!-- ========== 左侧侧边栏（固定 260px） ========== -->
    <aside id="sidebar"
           class="sidebar-panel fixed md:static z-40 flex h-full w-[260px] shrink-0 -translate-x-full md:translate-x-0 flex-col border-r border-slate-200 bg-white">
      <!-- Logo / 学校名称区域 -->
      <div class="flex items-center gap-3 border-b border-slate-100 px-4 py-5">
        <div class="flex h-10 w-10 shrink-0 items-center justify-center rounded-xl bg-campus-600 text-white font-bold text-sm">
          警
        </div>
        <div class="min-w-0">
          <p class="truncate text-sm font-semibold text-slate-800">浙江警官职业学院</p>
          <p class="truncate text-xs text-slate-400">校园 AI 助手</p>
        </div>
      </div>

      <!-- 新建对话 -->
      <div class="px-3 pt-4">
        <button id="btnNewChat"
                class="flex w-full items-center justify-center gap-2 rounded-lg border border-campus-200 bg-campus-50 px-3 py-2.5 text-sm font-medium text-campus-700 hover:bg-campus-100 transition-colors">
          <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
          </svg>
          新建对话
        </button>
      </div>

      <!-- 历史对话列表 -->
      <div class="mt-3 flex-1 overflow-y-auto px-2">
        <p class="px-2 pb-2 text-xs font-medium text-slate-400">历史对话</p>
        <ul id="historyList" class="space-y-0.5">
          <!-- 由 JS 动态渲染 -->
        </ul>
        <p id="emptyHistory" class="hidden px-2 py-6 text-center text-xs text-slate-400">暂无对话记录</p>
      </div>

      <!-- 清空全部对话 -->
      <div class="border-t border-slate-100 p-3">
        <button id="btnClearAll"
                class="flex w-full items-center justify-center gap-1.5 rounded-lg px-3 py-2 text-xs text-slate-400 hover:bg-red-50 hover:text-red-500 transition-colors">
          <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
          </svg>
          清空全部对话
        </button>
      </div>
    </aside>

    <!-- ========== 右侧主区域 ========== -->
    <main class="flex min-w-0 flex-1 flex-col">

      <!-- 顶部标题栏 -->
      <header class="flex h-14 shrink-0 items-center justify-between border-b border-slate-200 bg-white px-4">
        <div class="flex items-center gap-3">
          <!-- 移动端：展开侧边栏按钮 -->
          <button id="btnMenu"
                  class="flex h-8 w-8 items-center justify-center rounded-lg text-slate-500 hover:bg-slate-100 md:hidden"
                  onclick="toggleSidebar(true)">
            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
          </button>
          <h1 class="text-base font-semibold text-slate-800 md:text-lg">
            浙江警官职业学院校园AI助手
          </h1>
        </div>
        <!-- 清空当前对话 -->
        <button id="btnClearCurrent"
                class="rounded-lg px-3 py-1.5 text-xs text-slate-400 hover:bg-slate-100 hover:text-slate-600 transition-colors">
          清空当前对话
        </button>
      </header>

      <!-- 聊天对话容器 -->
      <div id="chatContainer" class="flex-1 overflow-y-auto px-4 py-6 md:px-8">
        <!-- 欢迎页（无消息时显示） -->
        <div id="welcomeScreen" class="flex h-full flex-col items-center justify-center text-center">
          <div class="mb-4 flex h-16 w-16 items-center justify-center rounded-2xl bg-campus-100 text-campus-600">
            <svg class="h-8 w-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                    d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
            </svg>
          </div>
          <h2 class="text-lg font-medium text-slate-700">你好，我是校园 AI 助手</h2>
          <p class="mt-2 max-w-md text-sm text-slate-400">
            我可以解答与学校相关的各类问题，包括校园生活、学习安排、规章制度等。请在下方输入你的问题。
          </p>
          <div class="mt-6 flex flex-wrap justify-center gap-2">
            <button class="suggest-btn rounded-full border border-slate-200 bg-white px-4 py-2 text-xs text-slate-600 hover:border-campus-300 hover:text-campus-600 transition-colors"
                    data-text="学校的作息时间是怎样安排的？">学校作息时间</button>
            <button class="suggest-btn rounded-full border border-slate-200 bg-white px-4 py-2 text-xs text-slate-600 hover:border-campus-300 hover:text-campus-600 transition-colors"
                    data-text="学生请假制度？">学生请假</button>
            <button class="suggest-btn rounded-full border border-slate-200 bg-white px-4 py-2 text-xs text-slate-600 hover:border-campus-300 hover:text-campus-600 transition-colors"
                    data-text="学校奖学金制度？">学生奖学金</button>
          </div>
        </div>
        <!-- 消息列表 -->
        <div id="messageList" class="mx-auto hidden max-w-3xl space-y-5"></div>
      </div>

      <!-- 底部输入区域 -->
      <footer class="shrink-0 border-t border-slate-200 bg-white px-4 py-3 md:px-8">
        <div class="mx-auto flex max-w-3xl items-end gap-2">
          <div class="relative flex-1">
            <textarea id="userInput"
                      rows="1"
                      placeholder="输入你的问题，按 Enter 发送..."
                      class="w-full resize-none rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 pr-12 text-sm leading-relaxed outline-none transition-colors focus:border-campus-400 focus:bg-white focus:ring-2 focus:ring-campus-100"
                      maxlength="2000"></textarea>
          </div>
          <button id="btnSend"
                  class="flex h-11 w-11 shrink-0 items-center justify-center rounded-xl bg-campus-600 text-white hover:bg-campus-700 disabled:opacity-40 disabled:cursor-not-allowed transition-colors"
                  title="发送">
            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
            </svg>
          </button>
        </div>
        <p class="mx-auto mt-2 max-w-3xl text-center text-xs text-slate-300">
          本助手仅回答与学校相关的问题 · 内容由 AI 生成，仅供参考
        </p>
      </footer>
    </main>
  </div>

  <script>
  /* ============================================================
   *  配置区 —— 修改以下变量即可对接 Dify
   * ============================================================ */

  /** Dify API 基础地址，末尾不要加斜杠，例如 https://api.dify.ai/v1 */
  const difyApiUrl = 'https://pinxclgs.sealoshzh.site/v1';

  /** Dify 应用 API Key（在 Dify 控制台 → 应用 → 访问 API 中获取） */
  const difyApiKey = 'app-TZudr50S10p0wBHZ2mCWzPDX';

  /** Dify 用户标识，用于区分终端用户，可自定义 */
  const difyUserId = 'campus-student-001';

  /**
   * 校园助手系统提示词
   * 说明：建议在 Dify 应用后台同步配置相同规则；
   * 若 Dify 应用定义了 inputs 变量 system_prompt，将自动传入。
   */
  const SYSTEM_PROMPT = `你是浙江警官职业学院的校园AI助手。请严格遵守以下规则：
1. 只回答与学生校园生活、学习、教务、后勤、规章制度等学校相关的问题。
2. 对于与学校无关的问题（如娱乐、政治、编程作业代写等），礼貌拒绝并引导用户询问学校相关话题。
3. 回答应准确、简洁、友好，使用简体中文。
4. 不确定的信息应如实告知，建议用户咨询相关部门或老师。`;

  /** localStorage 存储键名 */
  const STORAGE_KEY = 'campus_ai_conversations';

  /** 打字机效果：每个字符显示的间隔（毫秒），数值越小越快 */
  const TYPEWRITER_INTERVAL = 18;

  /** 是否启用本地模拟模式（API Key 为占位符时自动启用，无需后端即可体验） */
  const USE_MOCK = false;

  /* ============================================================
   *  状态管理
   * ============================================================ */

  let state = {
    conversations: [],       // 所有对话
    activeId: null,        // 当前激活的对话 ID（本地）
    isStreaming: false,      // 是否正在流式输出
    abortController: null,   // 用于中断请求
  };

  // 打字机缓冲区：key 为消息 DOM id，value 为 { buffer, displayed, timer }
  const typewriterMap = new Map();

  /* ============================================================
   *  DOM 引用
   * ============================================================ */
  const $ = (sel) => document.querySelector(sel);
  const historyList    = $('#historyList');
  const emptyHistory   = $('#emptyHistory');
  const messageList    = $('#messageList');
  const welcomeScreen  = $('#welcomeScreen');
  const chatContainer  = $('#chatContainer');
  const userInput      = $('#userInput');
  const btnSend        = $('#btnSend');
  const btnNewChat     = $('#btnNewChat');
  const btnClearAll    = $('#btnClearAll');
  const btnClearCurrent= $('#btnClearCurrent');

  /* ============================================================
   *  工具函数
   * ============================================================ */

  /** 生成唯一 ID */
  function uid() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
  }

  /** 从首条用户消息截取对话标题 */
  function makeTitle(text) {
    const t = text.trim().replace(/\n/g, ' ');
    return t.length > 18 ? t.slice(0, 18) + '…' : t || '新对话';
  }

  /** 持久化到 localStorage */
  function saveState() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        conversations: state.conversations,
        activeId: state.activeId,
      }));
    } catch (e) {
      console.warn('localStorage 写入失败：', e);
    }
  }

  /** 从 localStorage 恢复 */
  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      const data = JSON.parse(raw);
      state.conversations = data.conversations || [];
      state.activeId = data.activeId || null;
    } catch (e) {
      console.warn('localStorage 读取失败：', e);
    }
  }

  /** 获取当前对话对象 */
  function getActiveConversation() {
    return state.conversations.find(c => c.id === state.activeId) || null;
  }

  /** 滚动聊天区域到底部 */
  function scrollToBottom() {
    requestAnimationFrame(() => {
      chatContainer.scrollTop = chatContainer.scrollHeight;
    });
  }

  /** 移动端侧边栏开关 */
  function toggleSidebar(open) {
    const sidebar = $('#sidebar');
    const overlay = $('#sidebarOverlay');
    if (open) {
      sidebar.classList.remove('-translate-x-full');
      overlay.classList.remove('opacity-0', 'pointer-events-none');
    } else {
      sidebar.classList.add('-translate-x-full');
      overlay.classList.add('opacity-0', 'pointer-events-none');
    }
  }
  window.toggleSidebar = toggleSidebar;

  /* ============================================================
   *  渲染：历史列表 & 消息列表
   * ============================================================ */

  function renderHistoryList() {
    historyList.innerHTML = '';
    if (state.conversations.length === 0) {
      emptyHistory.classList.remove('hidden');
      return;
    }
    emptyHistory.classList.add('hidden');

    // 按更新时间倒序
    const sorted = [...state.conversations].sort((a, b) => b.updatedAt - a.updatedAt);
    sorted.forEach(conv => {
      const li = document.createElement('li');
      const isActive = conv.id === state.activeId;
      li.innerHTML = `
        <button data-id="${conv.id}"
                class="history-item group flex w-full items-center gap-2 rounded-lg px-3 py-2.5 text-left text-sm transition-colors
                       ${isActive ? 'bg-campus-50 text-campus-700 font-medium' : 'text-slate-600 hover:bg-slate-50'}">
          <svg class="h-4 w-4 shrink-0 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
          </svg>
          <span class="flex-1 truncate">${escapeHtml(conv.title)}</span>
          <span class="delete-btn hidden group-hover:flex h-5 w-5 shrink-0 items-center justify-center rounded text-slate-400 hover:text-red-500"
                data-id="${conv.id}" title="删除">
            <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </span>
        </button>`;
      historyList.appendChild(li);
    });

    // 绑定点击事件
    historyList.querySelectorAll('.history-item').forEach(btn => {
      btn.addEventListener('click', (e) => {
        if (e.target.closest('.delete-btn')) return;
        switchConversation(btn.dataset.id);
        toggleSidebar(false);
      });
    });
    historyList.querySelectorAll('.delete-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        deleteConversation(btn.dataset.id);
      });
    });
  }

  /** HTML 转义，防止 XSS */
  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /** 将纯文本转为带换行的 HTML */
  function textToHtml(text) {
    let html = text;
    html = html.replace(/\*\*/g, "");
    html = html.replace(/#{1,4}\s*/g, "");
    html = html.replace(/^-\s*/gm, "");
    html = html.replace(/-{3,}/g, "");
    const allPunctuation = /[，。！？；：""“”‘’、,.!?;:"'()（）【】{}《》]/g;
    html = html.replace(allPunctuation, "");
    html = html.replace(/[\u{1F300}-\u{1F6FF}\u{1F900}-\u{1F9FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/gu, "");
    html = html.replace(/\n/g, "<br>");
    return html;
  }

  function renderMessages() {
    const conv = getActiveConversation();
    if (!conv || conv.messages.length === 0) {
      welcomeScreen.classList.remove('hidden');
      messageList.classList.add('hidden');
      messageList.innerHTML = '';
      return;
    }
    welcomeScreen.classList.add('hidden');
    messageList.classList.remove('hidden');
    messageList.innerHTML = '';

    conv.messages.forEach((msg, idx) => {
      appendMessageBubble(msg.role, msg.content, `msg-${idx}`, false);
    });
    scrollToBottom();
  }

  /**
   * 追加一条消息气泡到界面
   * @param {'user'|'assistant'} role
   * @param {string} content
   * @param {string} domId
   * @param {boolean} isLoading 是否显示加载动画
   */
  function appendMessageBubble(role, content, domId, isLoading) {
    welcomeScreen.classList.add('hidden');
    messageList.classList.remove('hidden');

    const isUser = role === 'user';
    const wrapper = document.createElement('div');
    wrapper.className = `flex ${isUser ? 'justify-end' : 'justify-start'}`;
    // 气泡宽度：短文本收紧（w-fit），长文本自动换行；最大不超过聊天区 85%
    const bubbleBase = 'w-fit rounded-2xl px-4 py-2.5 text-sm leading-relaxed';
    const bubbleStyle = isUser
      ? `${bubbleBase} max-w-[85%] rounded-tr-sm bg-campus-600 text-white`
      : `${bubbleBase} max-w-full rounded-tl-sm border border-slate-100 bg-white text-slate-700 shadow-sm`;
    const contentHtml = isLoading
      ? '<span class="typing-dot"></span><span class="typing-dot ml-1"></span><span class="typing-dot ml-1"></span>'
      : textToHtml(content);

    wrapper.innerHTML = isUser
      ? `<div class="${bubbleStyle}">
          <div id="${domId}" class="message-content whitespace-pre-wrap break-words">${contentHtml}</div>
        </div>`
      : `<div class="flex max-w-[85%] items-start gap-2.5">
          <div class="mt-1 flex h-8 w-8 shrink-0 items-center justify-center rounded-full bg-campus-600 text-white text-lg font-medium">警</div>
          <div class="${bubbleStyle}">
            <div id="${domId}" class="message-content whitespace-pre-wrap break-words">${contentHtml}</div>
          </div>
        </div>`;
    messageList.appendChild(wrapper);
    scrollToBottom();
    return document.getElementById(domId);
  }

  /* ============================================================
   *  打字机效果
   * ============================================================ */

  /**
   * 向打字机缓冲区追加文本，并启动逐字显示
   * @param {string} domId  消息内容 DOM 的 id
   * @param {string} chunk  新到达的文本片段
   */
  function feedTypewriter(domId, chunk) {
    if (!typewriterMap.has(domId)) {
      typewriterMap.set(domId, { buffer: '', displayed: '', timer: null });
      // 清除加载动画
      const el = document.getElementById(domId);
      if (el) el.innerHTML = '';
    }
    const tw = typewriterMap.get(domId);
    tw.buffer += chunk;
    if (!tw.timer) startTypewriter(domId);
  }

  /** 启动打字机定时器 */
  function startTypewriter(domId) {
    const tw = typewriterMap.get(domId);
    if (!tw) return;
    const el = document.getElementById(domId);
    if (!el) return;

    tw.timer = setInterval(() => {
      if (tw.displayed.length < tw.buffer.length) {
        // 每次输出 1~2 个字符，中文友好
        const remain = tw.buffer.slice(tw.displayed.length);
        const step = /[\u4e00-\u9fff]/.test(remain[0]) ? 1 : Math.min(2, remain.length);
        tw.displayed += remain.slice(0, step);
        el.innerHTML = textToHtml(tw.displayed);
        scrollToBottom();
      } else {
        // 缓冲区已全部显示，暂停定时器（等待更多 chunk）
        clearInterval(tw.timer);
        tw.timer = null;
      }
    }, TYPEWRITER_INTERVAL);
  }

  /** 等待打字机完成（流结束后调用） */
  function finishTypewriter(domId) {
    return new Promise(resolve => {
      const check = () => {
        const tw = typewriterMap.get(domId);
        if (!tw || tw.displayed.length >= tw.buffer.length) {
          if (tw && tw.timer) { clearInterval(tw.timer); tw.timer = null; }
          // 确保最终文本完整
          const el = document.getElementById(domId);
          if (el && tw) el.innerHTML = textToHtml(tw.buffer);
          typewriterMap.delete(domId);
          resolve(tw ? tw.buffer : '');
        } else {
          requestAnimationFrame(check);
        }
      };
      check();
    });
  }

  /* ============================================================
   *  Dify API 流式对话（核心对接函数）
   * ============================================================ */

  /**
   * 调用 Dify 官方流式对话接口
   * 文档：https://docs.dify.ai/api-reference/chats/send-chat-message
   *
   * @param {string}   query               用户输入
   * @param {string}   difyConversationId  Dify 会话 ID（续聊时传入，新对话留空）
   * @param {function} onChunk             每收到一段文本时回调 (textChunk) => void
   * @param {function} onConversationId    首次返回 conversation_id 时回调
   * @param {AbortSignal} signal           用于中断请求
   * @returns {Promise<string>} 完整回复文本
   */
  async function callDifyStream(query, difyConversationId, onChunk, onConversationId, signal) {
    const url = `${difyApiUrl}/chat-messages`;

    const body = {
      inputs: {
        // 若 Dify 应用配置了 system_prompt 输入变量，将自动生效
        system_prompt: SYSTEM_PROMPT,
      },
      query: query,
      response_mode: 'streaming',
      conversation_id: difyConversationId || '',
      user: difyUserId,
      auto_generate_name: false,
    };

    const response = await fetch(url, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${difyApiKey}`,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify(body),
      signal,
    });

    if (!response.ok) {
      let errMsg = `HTTP ${response.status}`;
      try {
        const err = await response.json();
        errMsg = err.message || errMsg;
      } catch (_) {}
      throw new Error(errMsg);
    }

    // 解析 SSE（Server-Sent Events）流
    const reader = response.body.getReader();
    const decoder = new TextDecoder('utf-8');
    let buffer = '';
    let fullAnswer = '';
    let newConversationId = difyConversationId;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop(); // 保留未完整的行

      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed.startsWith('data:')) continue;

        const jsonStr = trimmed.slice(5).trim();
        if (!jsonStr || jsonStr === '[DONE]') continue;

        let data;
        try { data = JSON.parse(jsonStr); } catch (_) { continue; }

        // 记录 Dify 会话 ID
        if (data.conversation_id && !newConversationId) {
          newConversationId = data.conversation_id;
          onConversationId(newConversationId);
        }

        // 处理文本块：message / agent_message 事件
        if ((data.event === 'message' || data.event === 'agent_message') && data.answer) {
          fullAnswer += data.answer;
          onChunk(data.answer);
        }

        // 消息被替换（内容审核等）
        if (data.event === 'message_replace' && data.answer) {
          fullAnswer = data.answer;
          onChunk(data.answer);
        }

        // 错误事件
        if (data.event === 'error') {
          throw new Error(data.message || 'Dify 返回错误');
        }
      }
    }

    return fullAnswer;
  }

  /* ============================================================
   *  本地模拟流式回复（无 API Key 时演示用）
   * ============================================================ */

  async function callMockStream(query, onChunk, signal) {
    const replies = [
      '你好！我是浙江警官职业学院校园AI助手。',
      '关于你提到的问题，我来为你解答。',
      '如需了解具体政策或流程，建议你咨询所在系部辅导员或教务处。',
      '还有其他校园相关的问题，欢迎继续提问！',
    ];
    const text = `【模拟回复】${replies[Math.floor(Math.random() * replies.length)]}\n\n你问的是："${query}"\n\n（当前为演示模式，请配置 difyApiKey 后对接真实 API）`;
    for (const char of text) {
      if (signal.aborted) break;
      await new Promise(r => setTimeout(r, 30));
      onChunk(char);
    }
    return text;
  }

  /* ============================================================
   *  对话业务逻辑
   * ============================================================ */

  /** 新建对话 */
  function createConversation() {
    if (state.isStreaming) return;
    const conv = {
      id: uid(),
      title: '新对话',
      difyConversationId: '',
      messages: [],
      createdAt: Date.now(),
      updatedAt: Date.now(),
    };
    state.conversations.unshift(conv);
    state.activeId = conv.id;
    saveState();
    renderHistoryList();
    renderMessages();
    userInput.focus();
  }

  /** 切换对话 */
  function switchConversation(id) {
    if (state.isStreaming || id === state.activeId) return;
    state.activeId = id;
    saveState();
    renderHistoryList();
    renderMessages();
  }

  /** 删除单条对话 */
  function deleteConversation(id) {
    if (state.isStreaming) return;
    state.conversations = state.conversations.filter(c => c.id !== id);
    if (state.activeId === id) {
      state.activeId = state.conversations[0]?.id || null;
    }
    saveState();
    renderHistoryList();
    renderMessages();
  }

  /** 清空当前对话消息 */
  function clearCurrentConversation() {
    if (state.isStreaming) return;
    const conv = getActiveConversation();
    if (!conv) return;
    if (!confirm('确定清空当前对话的所有消息吗？')) return;
    conv.messages = [];
    conv.difyConversationId = '';
    conv.title = '新对话';
    conv.updatedAt = Date.now();
    saveState();
    renderHistoryList();
    renderMessages();
  }

  /** 清空全部对话 */
  function clearAllConversations() {
    if (state.isStreaming) return;
    if (!confirm('确定清空全部对话记录吗？此操作不可恢复。')) return;
    state.conversations = [];
    state.activeId = null;
    saveState();
    renderHistoryList();
    renderMessages();
  }

  /** 发送消息主流程 */
  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text || state.isStreaming) return;

    // 确保有当前对话
    if (!getActiveConversation()) {
      createConversation();
    }
    const conv = getActiveConversation();

    // 追加用户消息
    conv.messages.push({ role: 'user', content: text });
    if (conv.messages.length === 1) {
      conv.title = makeTitle(text);
    }
    conv.updatedAt = Date.now();
    saveState();
    renderHistoryList();

    // 渲染用户气泡
    const userDomId = `msg-${conv.messages.length - 1}`;
    appendMessageBubble('user', text, userDomId, false);

    // 清空输入框
    userInput.value = '';
    autoResizeInput();

    // 准备 AI 回复占位（加载动画）
    const aiDomId = `msg-${conv.messages.length}`;
    appendMessageBubble('assistant', '', aiDomId, true);

    // 开始流式请求
    state.isStreaming = true;
    btnSend.disabled = true;
    state.abortController = new AbortController();
    const signal = state.abortController.signal;

    let fullReply = '';

    const onChunk = (chunk) => feedTypewriter(aiDomId, chunk);

    const onConversationId = (difyConvId) => {
      conv.difyConversationId = difyConvId;
      saveState();
    };

    try {
      if (USE_MOCK) {
        fullReply = await callMockStream(text, onChunk, signal);
      } else {
        fullReply = await callDifyStream(
          text,
          conv.difyConversationId,
          onChunk,
          onConversationId,
          signal
        );
      }

      // 等待打字机打完
      fullReply = await finishTypewriter(aiDomId);

      // 保存 AI 回复
      conv.messages.push({ role: 'assistant', content: fullReply });
      conv.updatedAt = Date.now();
      saveState();

    } catch (err) {
      if (err.name === 'AbortError') return;
      const errText = `抱歉，请求出现问题：${err.message}\n\n请检查 difyApiUrl、difyApiKey 配置，或确认 Dify 服务已开启 CORS。`;
      const el = document.getElementById(aiDomId);
      if (el) el.innerHTML = textToHtml(errText);
      conv.messages.push({ role: 'assistant', content: errText });
      saveState();
    } finally {
      state.isStreaming = false;
      btnSend.disabled = false;
      state.abortController = null;
      scrollToBottom();
    }
  }

  /* ============================================================
   *  输入框自适应高度
   * ============================================================ */
  function autoResizeInput() {
    userInput.style.height = 'auto';
    userInput.style.height = Math.min(userInput.scrollHeight, 160) + 'px';
  }

  /* ============================================================
   *  事件绑定
   * ============================================================ */
  function bindEvents() {
    btnSend.addEventListener('click', sendMessage);

    userInput.addEventListener('keydown', (e) => {
      // Enter 发送，Shift+Enter 换行
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    userInput.addEventListener('input', autoResizeInput);

    btnNewChat.addEventListener('click', () => {
      createConversation();
      toggleSidebar(false);
    });

    btnClearAll.addEventListener('click', clearAllConversations);
    btnClearCurrent.addEventListener('click', clearCurrentConversation);

    // 推荐问题快捷按钮
    document.querySelectorAll('.suggest-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        userInput.value = btn.dataset.text;
        autoResizeInput();
        sendMessage();
      });
    });
  }

  /* ============================================================
   *  初始化
   * ============================================================ */
  function init() {
    loadState();
    bindEvents();

    if (state.conversations.length === 0) {
      // 首次访问不自动创建对话，展示欢迎页
      state.activeId = null;
    }

    renderHistoryList();
    renderMessages();
    userInput.focus();
  }

  init();
  </script>
</body>
</html>
